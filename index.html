<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #0b0b0f;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f5;
      --text-muted: #8888a0;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.35);
      --card-hover: rgba(255, 255, 255, 0.07);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text);
      overflow-x: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(92, 124, 255, 0.15), transparent 45%),
        var(--bg-deep);
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .hero {
      position: relative;
      z-index: 1;
      min-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 1.5rem 4rem;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(124, 92, 255, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 20% 40%, rgba(92, 124, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124, 92, 255, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      max-width: 680px;
    }
    .hero-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: heroFade 0.8s ease 0.2s forwards;
    }
    .hero h1 {
      font-size: clamp(2.75rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.08;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #fff 0%, #c8c8e0 50%, #a89ef0 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(24px);
      animation: heroFade 0.9s ease 0.35s forwards;
    }
    .hero-desc {
      font-size: clamp(1.05rem, 2.2vw, 1.25rem);
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 28em;
      margin: 0 auto 2.5rem;
      opacity: 0;
      transform: translateY(16px);
      animation: heroFade 0.8s ease 0.55s forwards;
    }
    @keyframes heroFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .hero-scroll {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      animation: heroFade 0.6s ease 1s forwards;
    }
    .hero-scroll-icon {
      width: 24px;
      height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      position: relative;
    }
    .hero-scroll-icon::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
      animation: scrollBounce 2s ease-in-out infinite;
    }
    @keyframes scrollBounce {
      0%, 100% { opacity: 1; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.5; transform: translateX(-50%) translateY(8px); }
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }
    .section-label {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    header .section-label { margin-bottom: 0.5rem; }
    .wrap h1 {
      font-size: clamp(2.25rem, 6vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #b8b8d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    .cards {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }
    .card {
      --x: 0px;
      --y: 0px;
      display: inline-flex;
      position: relative;
      align-items: center;
      width: auto;
      max-width: 100%;
      padding: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s ease, background 0.2s ease;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
    }
    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .card::before {
      content: '';
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 120px;
      height: 120px;
      margin: -60px 0 0 -60px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.5);
    }
    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(0); }
    .card-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.75rem;
      margin-right: 0;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .card:hover .card-icon {
      background: rgba(124, 92, 255, 0.12);
      border-color: rgba(124, 92, 255, 0.25);
    }
    .card-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--accent);
      stroke-width: 1.8;
    }
    .card-body {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem 0.75rem 0.5rem;
    }
    .card-title { white-space: nowrap; }
    .card .arrow {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .card .arrow svg {
      width: 9px;
      height: 9px;
      stroke: currentColor;
    }
    .card:hover .arrow {
      transform: translateX(3px);
      border-color: var(--accent);
      background: rgba(124, 92, 255, 0.15);
    }
    .card:nth-child(1) { transition-delay: 0.05s; }
    .card:nth-child(2) { transition-delay: 0.12s; }
    .card:nth-child(3) { transition-delay: 0.19s; }
    .card.recent::after {
      content: 'Recent';
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .wrap-footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    footer {
      text-align: center;
      margin-top: 3rem;
    }
    footer a {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <h1>Presentations</h1>
      <p class="tagline">Pick one and start exploring</p>
    </header>
    <nav class="cards" id="cards">
      <a href="planets/" class="card" data-card data-deck="planets/">
        <span class="card-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></span>
        <span class="card-body"><span class="card-title">Planets</span><span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span></span>
      </a>
      <a href="ui-ux-design/" class="card" data-card data-deck="ui-ux-design/">
        <span class="card-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></span>
        <span class="card-body"><span class="card-title">UI & UX design</span><span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span></span>
      </a>
      <a href="react-django-intro/" class="card" data-card data-deck="react-django-intro/">
        <span class="card-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></span>
        <span class="card-body"><span class="card-title">React & Django intro</span><span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span></span>
      </a>
    </nav>
    <footer class="wrap-footer">
      <a href="guide.html">How to make slides & push to main</a>
      <span style="color: var(--text-muted); margin: 0 0.5rem;">·</span>
      <a href="https://github.com/Haroon966/SlideWithCursor">View on GitHub</a>
    </footer>
  </div>
  <script>
    (function () {
      var STORAGE_KEY = 'slideWithCursorRecent';
      var container = document.getElementById('cards');
      var cards = document.querySelectorAll('[data-card]');

      function inView(el) {
        var r = el.getBoundingClientRect();
        return r.top < (window.innerHeight || document.documentElement.clientHeight) * 0.9;
      }
      function show() {
        cards.forEach(function (card) {
          if (inView(card)) card.classList.add('visible');
        });
      }

      // Put recently selected deck at position 1
      try {
        var recent = localStorage.getItem(STORAGE_KEY);
        if (recent) {
          var recentCard = document.querySelector('.card[data-deck="' + recent + '"]');
          if (recentCard && container && recentCard.parentNode === container) {
            container.insertBefore(recentCard, container.firstChild);
            recentCard.classList.add('recent');
          }
        }
      } catch (e) {}

      show();
      window.addEventListener('scroll', show);
      window.addEventListener('resize', show);

      cards.forEach(function (card) {
        card.addEventListener('mousemove', function (e) {
          var rect = card.getBoundingClientRect();
          card.style.setProperty('--x', (e.clientX - rect.left) + 'px');
          card.style.setProperty('--y', (e.clientY - rect.top) + 'px');
        });
        card.addEventListener('click', function () {
          try {
            var deck = card.getAttribute('data-deck') || card.getAttribute('href');
            if (deck) localStorage.setItem(STORAGE_KEY, deck.replace(/\/?$/, '/'));
          } catch (e) {}
        });
      });
    })();
  </script>
</body>
</html>
